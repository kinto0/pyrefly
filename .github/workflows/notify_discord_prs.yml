name: Notify Discord for new PRs

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  contents: read

jobs:
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification for external PR
        uses: actions/github-script@v8
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_PRS_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const webhookUrl = process.env.WEBHOOK_URL;
            if (!webhookUrl) {
              console.log('DISCORD_PRS_WEBHOOK_URL secret not set, skipping notification');
              return;
            }

            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (pr.draft) {
              console.log(`PR #${pr.number} is a draft, skipping notification`);
              return;
            }

            const ownersFile = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/owners.json',
            });
            const owners = JSON.parse(
              Buffer.from(ownersFile.data.content, 'base64').toString('utf8'),
            ).map((owner) => owner.toLowerCase());

            if (owners.includes(author.toLowerCase())) {
              console.log(`${author} is in .github/owners.json, skipping notification`);
              return;
            }

            const payload = {
              embeds: [{
                title: `New Pyrefly PR #${pr.number}: ${pr.title}`,
                url: pr.html_url,
                color: 16744448,
                fields: [{
                  name: 'Author',
                  value: `[${author}](${pr.user.html_url})`,
                  inline: true,
                }],
              }],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Discord notification failed: ${response.status} ${response.statusText}`);
            }

            console.log(`Discord notification sent for PR #${pr.number}`);
